# data/sources.yaml — seed URLs for the Phase 2 data pipeline.
#
# Usage:
#   python -m data_pipeline.cli fetch --sources data/sources.yaml
#
# Format: each top-level key is a technique label; the value is a list of
# publicly accessible YouTube URLs that yt-dlp can download.  The fetch
# subcommand will skip any URL that returns a network error or 404 so a single
# broken link does not abort the whole run.
#
# Add more URLs to improve reference template quality.  Remove or comment out
# any URL that becomes unavailable.

front_kick:
  # Howcast — "How to Do a Front Kick | Taekwondo Training"
